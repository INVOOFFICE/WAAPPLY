# ============================================================
# VISAPATH — Build static news pages
# Déclenché quand news.json change (via Google Apps Script)
# Génère actualites/<slug>/index.html + actualites/index.html
#         + sitemap.xml + llms.txt + robots.txt
# ============================================================
name: Build static news pages

on:
  push:
    branches: [main]
    paths:
      - "news.json"
      - "scripts/build-news-pages.mjs"
      - ".github/workflows/build-static-recipes.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-news-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate actualites/ pages, sitemap.xml, llms.txt, robots.txt
        run: node scripts/build-news-pages.mjs

      - name: Commit and push if changed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add actualites/ sitemap.xml llms.txt robots.txt
          if git diff --staged --quiet; then
            echo "Aucun changement détecté — pages déjà à jour."
            exit 0
          fi
          git commit -m "chore: régénération pages actualités statiques [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:refs/heads/$BRANCH"
