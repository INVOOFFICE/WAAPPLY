name: Build static AI news pages

on:
  push:
    branches: [main]
    paths:
      - "news.json"
      - "article.html"
      - "scripts/build-ai-news-pages.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-ai-news-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate articles, sitemap, and feed
        run: node scripts/build-ai-news-pages.mjs

      - name: Commit and push generated files if changed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles sitemap.xml feed.xml news.json
          if git diff --staged --quiet; then
            echo "No static AI news changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate static ai news pages"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:refs/heads/$BRANCH"

