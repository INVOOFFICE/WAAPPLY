name: Build static AI news pages

on:
  push:
    paths:
      - 'news.json'          # ← racine du repo, pas ai-news/news.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build article pages
        run: node scripts/build-ai-news-pages.mjs   # ← scripts/ à la racine

      - name: Commit and push generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git add sitemap.xml
          git add feed.xml
          git add news.json
          git add news-latest.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: rebuild static pages [skip ci]"
          git push
