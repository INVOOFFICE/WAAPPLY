# ============================================================
# SCHENGEN MAROC BLOG — Build static blog pages
# ✅ Compatible avec Google Apps Script (Code.gs) :
#    - Déclenché quand blogs.json change (push du GAS)
#    - Génère blog/<slug>/index.html + blog/index.html
#            + sitemap.xml + llms.txt + robots.txt
# ============================================================
name: Build static blog pages

on:
  push:
    branches: [master]
    paths:
      - "blogs.json"
      - "scripts/build-news-pages.mjs"
      - ".github/workflows/build-static-recipes.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-blog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog/ pages, sitemap.xml, llms.txt, robots.txt
        run: node scripts/build-news-pages.mjs

      - name: Commit and push if changed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml llms.txt robots.txt
          if git diff --staged --quiet; then
            echo "Aucun changement détecté — pages déjà à jour."
            exit 0
          fi
          git commit -m "chore: régénération pages blog statiques [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:refs/heads/$BRANCH"
