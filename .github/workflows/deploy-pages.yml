# GitHub Pages deploy: build (minify + index.html) then publish
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Quiets GitHub deprecation: JS actions use Node 24+ (see changelog Sept 2025).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # npm ci needs a valid lockfile (merge conflicts in package-lock.json break JSON → use npm install).
      - name: Install dependencies
        run: |
          if node -e "const fs=require('fs');try{const j=JSON.parse(fs.readFileSync('package-lock.json','utf8'));if(typeof j.lockfileVersion!=='number'||j.lockfileVersion<1)process.exit(1);}catch(e){process.exit(1)}"; then
            npm ci
          else
            echo "::warning::Invalid or missing package-lock.json — using npm install"
            npm install
          fi
      - run: npm run build
      - run: rm -rf node_modules
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
