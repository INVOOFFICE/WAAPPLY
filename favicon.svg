<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Inner subtle dark overlay for depth -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" opacity="0.15"/>

  <!-- Letter W — bold, serif-style, centered -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="Georgia, 'DM Serif Display', serif"
    font-size="36"
    font-weight="700"
    fill="url(#spark)"
    filter="url(#glow)"
    letter-spacing="-1"
  >W</text>

  <!-- AI spark dot — top right corner -->
  <circle cx="50" cy="14" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="14" r="2" fill="#6366f1"/>

  <!-- Subtle neural line decoration -->
  <line x1="10" y1="52" x2="22" y2="52" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="52" x2="38" y2="52" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="52" x2="54" y2="52" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
