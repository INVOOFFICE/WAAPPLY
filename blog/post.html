<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<meta name="color-scheme" content="dark">
<title>Article | WaApply</title>
<meta name="robots" content="index, follow">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/icon512x512.png" type="image/png" sizes="512x512">
<link rel="stylesheet" href="/styles.min.css?v=d21eb17186">
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="site-nav" aria-label="Main navigation">
  <a href="/" class="nav-logo" aria-label="WaApply — home">
    <img class="nav-logo-icon" src="/icon512x512.png" alt="" width="40" height="40" decoding="async" aria-hidden="true">
    <span class="nav-logo-name">WaApply</span>
    <span class="nav-badge">AI · freelance · guides</span>
  </a>
  <div class="nav-links">
    <a href="/#posts">Post grid</a>
    <a href="/#articles">Full guides</a>
  </div>
</nav>

<main id="main-content" class="site-main blog-post-page-main" tabindex="-1">
  <div class="container blog-post-page-inner">
    <p id="post-loading" class="blog-page-header-lead">Loading article…</p>
    <div id="post-error" class="blog-page-header-lead" hidden></div>
    <article id="post-article" class="blog-article blog-article--standalone reveal visible" itemscope itemtype="https://schema.org/BlogPosting" hidden>
      <div class="blog-article-meta">
        <time id="post-time" datetime="" itemprop="datePublished"></time>
        <span id="post-tag" class="blog-card-tag" itemprop="articleSection"></span>
      </div>
      <h1 class="blog-article-title" itemprop="headline"></h1>
      <p class="blog-article-dek" itemprop="description"></p>
      <p class="blog-post-home-link"><a href="/#articles">← All guides on homepage</a></p>
      <div id="post-body" class="blog-article-body blog-article-body--standalone" itemprop="articleBody"></div>
    </article>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p class="footer-left"><strong>WaApply</strong> — AI tools &amp; online income guides.</p>
    <nav class="footer-nav" aria-label="Footer">
      <a href="/">Home</a>
    </nav>
  </div>
</footer>

<script>
(function () {
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDate(iso) {
    if (!iso) return '';
    try {
      const d = new Date(String(iso) + 'T12:00:00Z');
      return new Intl.DateTimeFormat('en-US', { day: 'numeric', month: 'short', year: 'numeric' }).format(d);
    } catch (e) {
      return String(iso);
    }
  }

  function bodyFromPost(post) {
    if (post.bodyHtml && String(post.bodyHtml).trim()) return post.bodyHtml.trim();
    const paras = Array.isArray(post.paragraphs) ? post.paragraphs : [];
    return paras
      .map(function (p) {
        var t = String(p || '').trim();
        return t ? '<p>' + escapeHtml(t) + '</p>' : '';
      })
      .filter(Boolean)
      .join('\n');
  }

  var params = new URLSearchParams(location.search);
  var id = String(params.get('id') || '').trim();
  var loading = document.getElementById('post-loading');
  var errEl = document.getElementById('post-error');
  var article = document.getElementById('post-article');

  if (!id) {
    loading.hidden = true;
    errEl.hidden = false;
    errEl.textContent = 'Missing article id. Redirecting home…';
    setTimeout(function () { location.href = '/'; }, 1200);
    return;
  }

  fetch('/data/blog-posts.json', { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('Could not load blog data');
      return r.json();
    })
    .then(function (data) {
      var posts = data.posts || [];
      var post = null;
      for (var i = 0; i < posts.length; i++) {
        if (String(posts[i].id || '').trim() === id) {
          post = posts[i];
          break;
        }
      }
      loading.hidden = true;
      if (!post) {
        errEl.hidden = false;
        errEl.textContent = 'Article not found in blog-posts.json.';
        return;
      }

      document.title = post.title + ' | ' + (data.siteName || 'WaApply');
      document.querySelector('h1').textContent = post.title;
      document.getElementById('post-time').setAttribute('datetime', post.date || '');
      document.getElementById('post-time').textContent = formatDate(post.date);
      document.getElementById('post-tag').textContent = post.tag || '';
      document.querySelector('.blog-article-dek').textContent = post.excerpt || '';
      document.getElementById('post-body').innerHTML = bodyFromPost(post);
      article.hidden = false;
    })
    .catch(function () {
      loading.hidden = true;
      errEl.hidden = false;
      errEl.textContent = 'Could not load article list. Try again later.';
    });
})();
</script>
<script src="/main.min.js?v=dc64ea24df" defer></script>
</body>
</html>
