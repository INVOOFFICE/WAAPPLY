<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0e14">
<meta name="color-scheme" content="dark">
<title>Page not found | WaApply</title>
<link rel="icon" href="/icon512x512.png" type="image/png" sizes="512x512">
<link rel="stylesheet" href="/styles.min.css">
</head>
<body>
<main class="site-main blog-post-page-main" id="main-content" tabindex="-1">
  <div class="container blog-post-page-inner">
    <h1 class="blog-page-header-title">Redirecting…</h1>
    <p class="blog-page-header-lead" id="msg">
      If this was an old article URL, we will open the latest page automatically.
    </p>
    <p><a href="/" class="btn-wa btn-wa--ghost">Back to homepage</a></p>
  </div>
</main>

<script>
(function () {
  var path = location.pathname || '';
  var msg = document.getElementById('msg');
  var m = path.match(/^\/blog\/([^\/?#]+)\.html$/i);
  if (m && m[1]) {
    var id = decodeURIComponent(m[1]).trim();
    if (id) {
      var target = '/blog/post.html?id=' + encodeURIComponent(id) + location.search + location.hash;
      if (msg) msg.textContent = 'Redirecting to article: ' + id;
      location.replace(target);
      return;
    }
  }
  if (msg) {
    msg.textContent = 'Page not found. Use the homepage to browse all guides.';
  }
})();
</script>
</body>
</html>
