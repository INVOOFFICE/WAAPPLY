<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #0a0e14;
        --surface: #0f141c;
        --surface2: #121a24;
        --border: rgba(255, 255, 255, 0.09);
        --text: #e9eef5;
        --text2: #9eb0c4;
        --teal: #3dd9b0;
        --teal-dim: rgba(61, 217, 176, 0.12);
        --teal-glow: rgba(61, 217, 176, 0.25);
        --ok: #3dd9b0;
        --warn: #f0a500;
        --bad: #ff6b81;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }
      .title {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .sub {
        color: var(--text2);
        font-size: 11px;
      }
      .btn {
        border: 1px solid var(--teal-glow);
        background: var(--teal-dim);
        color: var(--teal);
        font-weight: 700;
        border-radius: 10px;
        font-size: 12px;
        padding: 7px 10px;
        cursor: pointer;
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 12px;
      }
      .ctl {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .ctl select {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 11px;
        padding: 5px 7px;
      }
      .btn.alt {
        color: var(--text);
        border-color: var(--border);
        background: var(--surface2);
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .kpi {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
      }
      .kpi .label {
        font-size: 10px;
        color: var(--text2);
      }
      .kpi .value {
        margin-top: 4px;
        font-size: 16px;
        font-weight: 800;
      }
      .card {
        background: linear-gradient(180deg, var(--surface2), var(--surface));
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 11px;
      }
      .card h3 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 800;
      }
      .kv {
        font-size: 12px;
        color: var(--text2);
        margin: 3px 0;
        line-height: 1.45;
      }
      .kv b { color: var(--text); font-weight: 700; }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .ok { color: var(--ok); background: rgba(61,217,176,0.12); border: 1px solid rgba(61,217,176,0.35); }
      .bad { color: var(--bad); background: rgba(255,107,129,0.12); border: 1px solid rgba(255,107,129,0.35); }
      .warn { color: var(--warn); background: rgba(240,165,0,0.12); border: 1px solid rgba(240,165,0,0.35); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .error {
        margin-top: 8px;
        color: var(--bad);
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .log-list {
        max-height: 280px;
        overflow: auto;
        border-radius: 10px;
        border: 1px solid var(--border);
      }
      .log-item {
        padding: 8px 9px;
        border-bottom: 1px solid var(--border);
        font-size: 11px;
      }
      .log-item:last-child { border-bottom: none; }
      .log-top {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 3px;
      }
      .tag {
        color: var(--teal);
        font-weight: 700;
      }
      .muted { color: var(--text2); }
      .loading {
        font-size: 12px;
        color: var(--text2);
        padding: 10px 0;
      }
      .spark {
        margin-top: 8px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .spark table {
        width: 100%;
        border-collapse: collapse;
        font-size: 10px;
      }
      .spark th, .spark td {
        padding: 5px 6px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      .spark tr:last-child td { border-bottom: none; }
      .action-output {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px;
        white-space: pre-wrap;
        font-size: 11px;
        line-height: 1.45;
        color: var(--text2);
        margin-bottom: 10px;
        display: none;
      }
      .score {
        font-size: 28px;
        font-weight: 900;
        line-height: 1;
        margin: 4px 0 6px;
      }
      .score.good { color: var(--ok); }
      .score.mid { color: var(--warn); }
      .score.bad { color: var(--bad); }
      .alert-list {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .alert-item {
        padding: 8px 9px;
        border-bottom: 1px solid var(--border);
        font-size: 11px;
      }
      .alert-item:last-child { border-bottom: none; }
      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 7px;
        font-size: 10px;
        font-weight: 700;
        margin-right: 6px;
      }
      .pill.critical { color: var(--bad); background: rgba(255,107,129,0.14); }
      .pill.warning { color: var(--warn); background: rgba(240,165,0,0.14); }
      .pill.info { color: var(--teal); background: rgba(61,217,176,0.14); }
    </style>
  </head>
  <body>
    <div class="top">
      <div>
        <div class="title">WaApply Ops Dashboard</div>
        <div class="sub" id="lastUpdated">Loading…</div>
      </div>
      <button class="btn" onclick="loadData()">Refresh</button>
    </div>

    <div class="ctl">
      <span class="sub">Auto refresh</span>
      <select id="refreshSelect" onchange="changeRefreshMs(this.value)">
        <option value="0">Off</option>
        <option value="30000">30s</option>
        <option value="60000" selected>60s</option>
        <option value="120000">120s</option>
      </select>
      <span class="sub" id="cacheInfo"></span>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="runAction('dashboardValidateGitHubConfig', 'GitHub validation')">Validate GitHub</button>
      <button class="btn" onclick="runAction('dashboardRunHealthCheck', 'Health check')">Run health check</button>
      <button class="btn alt" onclick="runAction('dashboardOpenRapportSheet', 'Open Rapport')">Open Rapport</button>
    </div>
    <div class="action-output" id="actionOutput"></div>

    <div class="grid" id="cards">
      <div class="loading">Loading dashboard data…</div>
    </div>

    <script>
      var refreshTimer = null;
      var refreshMs = Number(localStorage.getItem('waapply.dashboard.refreshMs') || 60000);

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function badge(ok) {
        return '<span class="status ' + (ok ? 'ok' : 'bad') + '">' + (ok ? 'Operational' : 'Needs attention') + '</span>';
      }

      function logTypeClass(type) {
        if (!type) return 'muted';
        if (type.indexOf('ERREUR') === 0) return 'bad';
        if (type.indexOf('PUBLICATION') === 0) return 'ok';
        return 'warn';
      }

      function render(data) {
        var updated = document.getElementById('lastUpdated');
        var when = data.nowIso ? new Date(data.nowIso) : new Date();
        updated.textContent = 'Last refresh: ' + when.toLocaleString();
        var cacheInfo = document.getElementById('cacheInfo');
        var meta = data.meta || {};
        cacheInfo.textContent = meta.cached ? 'cached snapshot' : 'fresh snapshot';

        var cards = [];
        var k = data.kpi || {};
        var alerts = data.alerts || [];
        var score = Number(data.healthScore || 0);

        cards.push(
          '<section class="card">' +
            '<h3>Health score</h3>' +
            '<div class="score ' + scoreClass(score) + '">' + esc(score) + '/100</div>' +
            '<div class="kv"><b>Status:</b> ' + (score >= 85 ? 'stable' : score >= 60 ? 'watch closely' : 'action required') + '</div>' +
            renderAlerts(alerts) +
          '</section>'
        );

        cards.push(
          '<section class="card">' +
            '<h3>Performance KPIs</h3>' +
            '<div class="kpi-grid">' +
              '<div class="kpi"><div class="label">Published today</div><div class="value">' + esc(k.todayPublished || 0) + '</div></div>' +
              '<div class="kpi"><div class="label">IA captured today</div><div class="value">' + esc(k.todayIaCaptured || 0) + '</div></div>' +
              '<div class="kpi"><div class="label">Errors (24h)</div><div class="value">' + esc(k.errors24h || 0) + '</div></div>' +
              '<div class="kpi"><div class="label">Manual syncs (24h)</div><div class="value">' + esc(k.syncs24h || 0) + '</div></div>' +
            '</div>' +
            '<div class="kv"><b>7d totals:</b> published=' + esc(k.published7d || 0) + ', errors=' + esc(k.errors7d || 0) + '</div>' +
            renderDailyMiniTable(k.daily7d || []) +
          '</section>'
        );

        cards.push(
          '<section class="card">' +
            '<h3>Global status</h3>' +
            badge(!!data.ok) +
            '<div class="kv"><b>Timezone:</b> <span class="mono">' + esc(data.projectTimezone || '(unknown)') + '</span></div>' +
            '<div class="kv"><b>Scheduled publish:</b> hour=' + esc(data.publishSettings.hour) + ', batch=' + esc(data.publishSettings.batch) + '</div>' +
          '</section>'
        );

        var gh = data.github || {};
        cards.push(
          '<section class="card">' +
            '<h3>GitHub</h3>' +
            badge(!!gh.ok) +
            '<div class="kv"><b>Target:</b> <span class="mono">' + esc((gh.owner || '?') + '/' + (gh.repo || '?') + ' @ ' + (gh.branch || '?')) + '</span></div>' +
            '<div class="kv"><b>Repo:</b> ' + esc(gh.fullName || '-') + '</div>' +
            '<div class="kv"><b>Default branch:</b> ' + esc(gh.defaultBranch || '-') + '</div>' +
            '<div class="kv"><b>Visibility:</b> ' + (gh.privateRepo ? 'private' : 'public') + '</div>' +
            (gh.error ? '<div class="error">' + esc(gh.error) + '</div>' : '') +
          '</section>'
        );

        var art = data.articles || {};
        cards.push(
          '<section class="card">' +
            '<h3>Articles queue</h3>' +
            badge(!!art.ok) +
            '<div class="kv"><b>Sheet:</b> ' + esc(art.sheetName || '-') + '</div>' +
            '<div class="kv"><b>Total posts (rows):</b> ' + esc(art.totalRows) + '</div>' +
            '<div class="kv"><b>Pending publish:</b> ' + esc(art.pendingRows) + '</div>' +
            '<div class="kv"><b>Mapping:</b> <span class="mono">' + esc(art.mappedColumns || '-') + '</span></div>' +
            (art.error ? '<div class="error">' + esc(art.error) + '</div>' : '') +
          '</section>'
        );

        var tr = data.triggers || {};
        cards.push(
          '<section class="card">' +
            '<h3>Triggers</h3>' +
            '<div class="kv"><b>Total:</b> ' + esc(tr.total) + '</div>' +
            '<div class="kv"><b>GitHub publish:</b> ' + esc(tr.github) + '</div>' +
            '<div class="kv"><b>IA fetch:</b> ' + esc(tr.ia) + '</div>' +
            '<div class="kv"><b>Facebook publish:</b> ' + esc(tr.facebook) + '</div>' +
          '</section>'
        );

        var sp = data.sitemapPing || {};
        cards.push(
          '<section class="card">' +
            '<h3>Sitemap ping status</h3>' +
            (sp.hasData ? badge(!!sp.ok) : '<div class="kv muted">No ping data yet.</div>') +
            '<div class="kv"><b>Last ping:</b> ' + esc(sp.tsIso ? new Date(sp.tsIso).toLocaleString() : '-') + '</div>' +
            '<div class="kv"><b>Sitemap:</b> <span class="mono">' + esc(sp.sitemapUrl || '-') + '</span></div>' +
            '<div class="kv"><b>Google HTTP:</b> ' + esc(sp.googleCode || '-') + '</div>' +
            '<div class="kv"><b>Bing HTTP:</b> ' + esc(sp.bingCode || '-') + '</div>' +
            (sp.error ? '<div class="error">' + esc(sp.error) + '</div>' : '') +
          '</section>'
        );

        var rp = data.rapport || { hasSheet: false, recent: [] };
        var logs = '';
        if (!rp.hasSheet) {
          logs = '<div class="muted">Rapport sheet not found yet.</div>';
        } else if (!rp.recent || rp.recent.length === 0) {
          logs = '<div class="muted">No recent logs.</div>';
        } else {
          var items = [];
          for (var i = 0; i < rp.recent.length; i++) {
            var x = rp.recent[i];
            items.push(
              '<div class="log-item">' +
                '<div class="log-top"><span class="tag ' + logTypeClass(x.type) + '">' + esc(x.type || '-') + '</span><span class="muted">' + esc(x.ts || x.day || '') + '</span></div>' +
                '<div>' + esc(x.summary || '-') + '</div>' +
                (x.ids ? '<div class="muted">IDs: ' + esc(x.ids) + '</div>' : '') +
              '</div>'
            );
          }
          logs = '<div class="log-list">' + items.join('') + '</div>';
        }
        cards.push('<section class="card"><h3>Rapport (recent)</h3>' + logs + '</section>');

        document.getElementById('cards').innerHTML = cards.join('');
      }

      function showError(err) {
        var msg = (err && err.message) ? err.message : String(err || 'Unknown error');
        document.getElementById('cards').innerHTML =
          '<section class="card"><h3>Dashboard error</h3><div class="error">' + esc(msg) + '</div></section>';
      }

      function scoreClass(score) {
        if (score >= 85) return 'good';
        if (score >= 60) return 'mid';
        return 'bad';
      }

      function renderAlerts(alerts) {
        if (!alerts || alerts.length === 0) {
          return '<div class="kv"><b>Alerts:</b> none</div>';
        }
        var out = ['<div class="alert-list">'];
        for (var i = 0; i < alerts.length; i++) {
          var a = alerts[i] || {};
          var level = String(a.level || 'info');
          out.push(
            '<div class="alert-item"><span class="pill ' +
              esc(level) +
              '">' +
              esc(level) +
              '</span>' +
              esc(a.message || '') +
              '</div>'
          );
        }
        out.push('</div>');
        return out.join('');
      }

      function renderDailyMiniTable(rows) {
        if (!rows || rows.length === 0) {
          return '<div class="muted">No 7-day trend data.</div>';
        }
        var out = [];
        out.push('<div class="spark"><table><thead><tr><th>Day</th><th>Published</th><th>Errors</th></tr></thead><tbody>');
        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var d = String(r.day || '');
          out.push(
            '<tr><td class="mono">' +
              esc(d.slice(5) || d) +
              '</td><td>' +
              esc(r.published || 0) +
              '</td><td>' +
              esc(r.errors || 0) +
              '</td></tr>'
          );
        }
        out.push('</tbody></table></div>');
        return out.join('');
      }

      function loadData() {
        document.getElementById('cards').innerHTML = '<div class="loading">Refreshing…</div>';
        google.script.run
          .withSuccessHandler(render)
          .withFailureHandler(showError)
          .getDashboardSnapshot();
      }

      function runAction(fnName, label) {
        var out = document.getElementById('actionOutput');
        out.style.display = 'block';
        out.textContent = label + '...';
        google.script.run
          .withSuccessHandler(function (result) {
            out.textContent = (result || (label + ' done.'));
            loadData();
          })
          .withFailureHandler(function (err) {
            out.textContent =
              label +
              ' failed:\n' +
              ((err && err.message) ? err.message : String(err || 'Unknown error'));
          })[fnName]();
      }

      function applyRefreshSetting() {
        var sel = document.getElementById('refreshSelect');
        if (sel) sel.value = String(refreshMs);
        if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
        if (refreshMs > 0) {
          refreshTimer = setInterval(loadData, refreshMs);
        }
      }

      function changeRefreshMs(v) {
        refreshMs = Number(v || 0);
        localStorage.setItem('waapply.dashboard.refreshMs', String(refreshMs));
        applyRefreshSetting();
      }

      applyRefreshSetting();
      loadData();
    </script>
  </body>
</html>
